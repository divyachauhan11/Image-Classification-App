<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Classifier - Access Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0d4b8f; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; color: white; }
        .bg-shape { position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; }
        .shape1 { background: #2b7cd3; width: 400px; height: 400px; top: -100px; left: 20%; }
        .shape2 { background: #062b59; width: 500px; height: 500px; bottom: -150px; right: 15%; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 40px 30px; width: 380px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); }
        .logo { text-align: center; font-weight: 600; margin-bottom: 20px; font-size: 20px;}
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #e0e0e0; }
        .input-group input { width: 100%; padding: 12px 15px; border: none; border-radius: 8px; background: #ffffff; color: #333; outline: none; font-size: 14px; }
        .btn { width: 100%; padding: 12px; background-color: #062b59; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        .btn:hover { background-color: #0a3d7a; }
        .toggle-link { text-align: center; font-size: 12px; margin-top: 20px; color: #e0e0e0; cursor: pointer; }
        .toggle-link span { color: white; font-weight: 600; text-decoration: underline; }
        #error-msg { color: #ff6b6b; font-size: 13px; text-align: center; margin-bottom: 10px; display: none;}
        
        .social-login { text-align: center; margin-top: 20px; }
        .social-login p { font-size: 12px; color: #e0e0e0; margin-bottom: 10px; }
        .social-icons { display: flex; justify-content: center; gap: 15px; }
        .social-btn { background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; transition: 0.2s; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .social-btn:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="glass-card">
        <div class="logo">🖼️ Image Classifier</div>
        <h2 id="form-title">Login</h2>
        <p id="error-msg"></p>

        <form id="auth-form">
            <div class="input-group" id="name-group" style="display: none;">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" id="submit-btn">Sign In</button>
        </form>

        <div class="social-login">
            <p>or continue with</p>
            <div class="social-icons">
                <a href="/login/google" class="social-btn"><i class="fa-brands fa-google" style="color: #DB4437;"></i></a>
                <a href="/login/github" class="social-btn"><i class="fa-brands fa-github" style="color: #333;"></i></a>
            </div>
        </div>

        <p class="toggle-link" id="toggle-btn">Don't have an account? <span>Register here</span></p>
    </div>

    <script>
        let isLogin = true;
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const errorMsg = document.getElementById('error-msg');
        const nameGroup = document.getElementById('name-group');
        const nameInput = document.getElementById('name');

        // Toggle between Login and Signup
        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            formTitle.innerText = isLogin ? "Login" : "Sign Up";
            submitBtn.innerText = isLogin ? "Sign In" : "Create Account";
            toggleBtn.innerHTML = isLogin ? "Don't have an account? <span>Register here</span>" : "Already have an account? <span>Login here</span>";
            errorMsg.style.display = 'none';
            
            if (isLogin) {
                nameGroup.style.display = 'none';
                nameInput.removeAttribute('required');
            } else {
                nameGroup.style.display = 'block';
                nameInput.setAttribute('required', 'required');
            }
        });

        // Form Submit Logic
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = nameInput.value; // Naya
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const action = isLogin ? 'login' : 'signup';

            const response = await fetch('/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, name, email, password }) // Naya: Name data bhej rahe hain
            });

            const data = await response.json();
            if (response.ok) {
                window.location.href = "/dashboard";
            } else {
                errorMsg.innerText = data.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
